name: tests

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      reproduce:
        description: "Regenerate and upload paper artifacts"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip

      - name: Install package and development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Test
        run: python -m pytest --cov=featuregraph --cov-report=term-missing

      - name: Check reproduction CLI
        run: python scripts/reproduce.py --help

  package:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build frontend
        run: python -m pip install --upgrade pip build

      - name: Build wheel and source distribution
        run: python -m build

      - name: Smoke-test wheel
        run: |
          python -m venv /tmp/featuregraph-wheel-test
          /tmp/featuregraph-wheel-test/bin/python -m pip install dist/*.whl
          /tmp/featuregraph-wheel-test/bin/python -c "import featuregraph; assert featuregraph.__version__ == '0.1.0a1'"

      - name: Upload distributions
        uses: actions/upload-artifact@v6
        with:
          name: distributions
          path: dist/
          if-no-files-found: error

  reproduce:
    name: Regenerate paper artifacts
    if: github.event_name == 'workflow_dispatch' && inputs.reproduce
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package
        run: python -m pip install -e .

      - name: Regenerate artifacts
        run: python scripts/reproduce.py --refresh

      - name: Upload paper artifacts
        uses: actions/upload-artifact@v6
        with:
          name: paper-artifacts
          path: artifacts/paper/
          if-no-files-found: error
